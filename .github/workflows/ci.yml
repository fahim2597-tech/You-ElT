name: You-ElT CI Pipeline


on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main



jobs:

  python-check:

    name: Python Code Validation

    runs-on: ubuntu-latest


    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"


    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt


    - name: Python Syntax Check
      run: |
        python -m compileall dags



  docker-check:


    name: Docker Compose Validation

    runs-on: ubuntu-latest


    steps:


    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Validate Docker Compose
      run: |
        docker compose config



  airflow-dag-check:


    name: Airflow DAG Import Test

    runs-on: ubuntu-latest


    steps:


    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"


    - name: Install Airflow
      run: |
        pip install apache-airflow==3.3.0


    - name: Test DAG Import
      run: |
        python -c "
        from dags.main import dag_produce
        print('DAG Loaded Successfully')
        "
